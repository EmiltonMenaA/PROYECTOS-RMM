<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ingresar — Proyectos RMM</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet" />
  <style>body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial;}</style>
</head>
<body class="min-h-screen bg-[url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1400&auto=format&fit=crop&ixlib=rb-4.0.3&s=placeholder')] bg-cover flex items-center justify-center">
  <div class="bg-white/95 backdrop-blur-sm rounded-xl shadow-lg p-8 w-full max-w-md">
    <div class="text-center mb-6">
      <div class="h-12 w-12 mx-auto bg-blue-600 text-white rounded flex items-center justify-center font-bold">P</div>
      <h2 class="text-xl font-bold mt-4">Portal Proyectos RMM</h2>
    </div>
    <form action="#" method="post" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700">Correo electrónico</label>
        <input name="email" type="email" required class="mt-1 w-full rounded border px-3 py-2" placeholder="nombre@empresa.com" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700">Contraseña</label>
        <input name="password" type="password" required class="mt-1 w-full rounded border px-3 py-2" />
      </div>
      <div class="flex items-center justify-between">
        <a href="#" class="text-sm text-blue-600">¿Olvidaste tu contraseña?</a>
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Iniciar Sesión</button>
      </div>
    </form>
    <p class="text-center text-xs text-slate-500 mt-4">¿Eres nuevo? <a href="#" class="text-blue-600">Solicitar acceso</a></p>
  </div>
</body>
</html>
